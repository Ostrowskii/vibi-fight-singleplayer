name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Prepare site artifact
        run: |
          test -f index.html
          test -f play/index.html
          test -f story/index.html
          mkdir -p dist
          cp index.html dist/index.html
          mkdir -p dist/play
          cp play/index.html dist/play/index.html
          mkdir -p dist/story
          cp story/index.html dist/story/index.html
          mkdir -p dist/assets/skills
          cp assets/skills/*.svg dist/assets/skills/
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
