name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout Bend2
        uses: actions/checkout@v4
        with:
          repository: HigherOrderCO/bend2
          path: vendor/bend2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build site
        run: |
          mkdir -p dist
          bun vendor/bend2/bend-ts/src/CLI.ts src/main.bend --to-web --no-strict > dist/index.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
